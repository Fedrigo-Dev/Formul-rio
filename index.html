<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="Adicionais/culturama-favico.png">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fjalla+One&family=Work+Sans&display=swap" rel="stylesheet">

    <title>Pesquisa Culturama</title>



</head>

<body>
    <main>
        <header>
        <img src="Adicionais/logo-culturama.png" alt="Logo culturama">
        <h1>Pesquisa de Opinião</h1>
    </header>
    <div class="allTextContent">
    <section>
        <form action="sucesso.html" method="get">
            <fieldset>
                <!-- Dados Pessoais-->
                <legend>Dados Pessoais</legend>
                <label for="name">Nome Completo* </label>
                <input id="name" type="text" name="userName" pattern=".{6,}" required>
                <br>
                <label for="age">Idade*</label>
                <input id="age" type="number" name="userAge" min="12" max="100" required> 
                <br>
                <label for="birthDate">Data de Nascimento</label>
                <input id="birthDate" type="date" name="birthDate">
                <br>
                <label for="userEmail">Email*</label>
                <input id="userEmail" type="email" name="userEmail" required>
                <br>
                <label for="phoneNumber">Número de Telefone</label>
                <input id="phoneNumber" type="tel" name="userPhoneNumber" pattern="[0-9]{11>}" placeholder="DDD + número sem espaços ou hífen">
                <br> 
                <label for="image">Upload de foto</label>
                <input id="image" type="file" accept="image/*" name="userImage">
                <br>
                
            </fieldset>

            <fieldset>

                <legend>Perfil</legend>

                <p>Gênero:</p>
                <input id="fem" type="radio" name="userGender" value="Feminino">
                <label for="fem">Feminino</label>

                <input id="masc" type="radio" name="userGender" value="Masculino">
                <label for="masc">Masculino</label>

                <input id="notInformed" type="radio" name="userGender" value="noInformed">
                <label for="notInformed">Prefiro não informar</label>
                <br>
                <label for="maritalStatus">Estado Civil:</label>
                <select id="maritalStatus" name="userMaritalStatus">
                    <option value="notInformed">Selecione...</option>
                    <option value="casado">Casado</option>
                    <option value="solteiro">Solteiro</option>
                    <option value="divorciado">Divorcido</option>
                    <option value="uniaoestavel">União Estável</option>
                </select>

                <br>
                <label for="state">Estado</label>
                <select id="state" name="userState" required>
                    <option value="acre">Acre</option>
                    <option value="alagoas">Alagoas</option>
                    <option value="amapa">Amapá</option>
                    <option value="amazonas">Amazonas</option>
                    <option value="bahia">Bahia</option>
                    <option value="ceara">Ceará</option>
                    <option value="distritoFederal">Distrito Federal</option>
                    <option value="espiritoSanto">Espirito Santo</option>
                    <option value="goias">Goiás</option>
                    <option value="maranhao">Maranhão</option>
                    <option value="matoGrossoDoSul">Mato Grosso do Sul</option>
                    <option value="matoGrosso">Mato Grosso</option>
                    <option value="minasGerais">Minas Gerais</option>
                    <option value="para">Pará</option>
                    <option value="paraiba">Paraíba</option>
                    <option value="parana">Paraná</option>
                    <option value="pernambuco">Pernambuco</option>
                    <option value="piaui">Piauí</option>
                    <option value="rioDeJaneiro">Rio de Janeiro</option>
                    <option value="rioGrandeDoNorte">Rio Grande do Norte</option>
                    <option value="rioGrandeDoSul">Rio Grande do Sul</option>
                    <option value="rondonia">Rondônia</option>
                    <option value="roraima">Roraima</option>
                    <option value="santaCatarina">Santa Catarina</option>
                    <option value="saoPaulo">São Paulo</option>
                    <option value="sergipe">Sergipe</option>
                    <option value="tocantins">Tocantins</option>
                </select>

                <br>

                <section>
                    <label for="userCity">Cidade:</label>
                    <input type="text" id="userCity" name="userCity" autocomplete="address-level2" placeholder="Ex.: Fortaleza" />
                </section>

            </fieldset>

            <fieldset>
                <legend>Hábitos</legend>

                <p>Redes Sociais:</p>

                <input id="instagram" type="checkbox" name="social" value="instagram">
                <label for="instagram">Instagram</label>
                <br>
                <input id="facebook" type="checkbox" name="social" value="facebook">
                <label for="facebook">Facebook</label>
                <br>
                <input id="linkedin" type="checkbox" name="social" value="linkedin">
                <label for="linkedin">Linkedin</label>
                <br>
                <input id="x" type="checkbox" name="social" value="x">
                <label for="x">X</label>
                <br>
                <label for="musicStyle">Estilo Musical: </label>
                <input list="styleTypes" id="musicStyle" name="userMusicStyle" type="text">
                <datalist id="styleTypes">
                    <option value="Rock">
                    <option value="Pop">
                    <option value="Samba">
                    <option value="Sertanejo">
                </datalist>
                <br>
                <label for="favoriteColor">Cor Favorita</label>
                <input type="color" name="userFavoriteColor" id="favoriteColor">

            </fieldset>

            <fieldset>
                <legend>Opinião</legend>

                <p>Satisfação:</p>
                <input id="bad" type="radio" name="userOpinion" value="Ruim">
                <label for="bad">Ruim</label>

                <input id="desagradavel" type="radio" name="userOpinion" value="Desagradável">
                <label for="desagradavel">Desagradável</label>

                <input id="normal" type="radio" name="userOpinion" value="Normal">
                <label for="normal">Normal</label>

                <input id="bom" type="radio" name="userOpinion" value="Bom">
                <label for="bom">Bom</label>

                <input id="muitoBom" type="radio" name="userOpinion" value="MuitoBom">
                <label for="muitoBom">Muito bom</label>
                <br>
                <label for="text"></label>
                <textarea style="width: 635px; height: 125px;" name="comentario" placeholder="Digite seu Comentário..."></textarea>
            </fieldset>

            <fieldset>
                <legend>Confirmações</legend>

                <input type="checkbox"p name="userLgpd" id="userLgpdTerm" value="accepted" required>
                <label for="userLgpdTerm">Eu aceito participar da pesquisa</label>
                <br>
                <input type="checkbox" name="userGetResult" id="getResult" value="accepted">
                <label for="getResult">Desejo receber o resultado por e-mail</label>
            </fieldset>

            <div class="button-container">
                <button type="submit">Enviar</button>
                <button type="reset">Limpar</button>
            </div>
        </form>
    </section>
    </div>
    </main>
</body>
</html>
